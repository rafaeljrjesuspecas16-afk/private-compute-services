edition = "2024";

package com.google.android.as.oss.features.optin.api;

option features.field_presence = IMPLICIT;
option java_package = "com.google.android.as.oss.features.optin.api.proto";

// Service for managing feature opt-ins.
service FeatureOptInService {
  // Writes the opt-in status for one or more settings.
  rpc WriteOptInStatus(WriteOptInStatusRequest)
      returns (WriteOptInStatusResponse) {
    option deadline = 5.0;
  }
}

// Represents a generic value for a setting.
message SettingValue {
  oneof value {
    int32 int_value = 1;

    int64 long_value = 2;

    float float_value = 3;

    string string_value = 4;
  }
}

// Represents a single opt-in setting with its name and value.
message OptInSetting {
  // The name of the setting.
  string setting_name = 1;

  // The value of the setting.
  SettingValue value = 2;
}

// Request message for writing opt-in statuses.
message WriteOptInStatusRequest {
  // The settings to write.
  repeated OptInSetting settings_to_write = 1;
}

// Response message for writing opt-in statuses.
message WriteOptInStatusResponse {
  // The results of the write operations.
  repeated WriteResult write_results = 1;
}

// Represents the result of a single write operation for an opt-in setting.
message WriteResult {
  // The setting that was written to.
  OptInSetting setting = 1;

  // The status of the write operation.
  enum Status {
    UNKNOWN = 0;
    SUCCESS = 1;
    FAILURE = 2;
  }

  Status status = 2;

  // Whether the setting was newly created or already existed.
  bool was_new_setting = 3;

  // The previous value of the setting, if it existed.
  SettingValue previous_value = 4;
}
