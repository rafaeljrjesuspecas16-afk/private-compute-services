edition = "2024";

package com.google.android.as.oss.feedback.api.gateway;


option java_outer_classname = "Spoon";
option java_package = "com.google.android.as.oss.feedback.api.gateway";

enum SpoonCUJ {
  SPOON_CUJ_UNKNOWN = 0;

  SPOON_CUJ_MR_NOTIFICATION = 1;
  SPOON_CUJ_MR_KEYBOARD = 2;
  SPOON_CUJ_MA_NOTIFICATION = 3;
  SPOON_CUJ_BUGLE = 4;
  SPOON_CUJ_SUBZERO_REMINDERS_TILE = 5;
  SPOON_CUJ_SUNDOG_LOCATION = 6;
  SPOON_CUJ_SUNDOG_EVENT = 7;
  SPOON_CUJ_BEACON = 8;
  SPOON_CUJ_SMART_CLIPBOARD = 10;
  SPOON_CUJ_AMBIENT_CUE = 11;
  SPOON_CUJ_OVERALL_FEEDBACK = 12;

  // Retired CUJ enums.
  SPOON_CUJ_RETIRED_T9 = 9 [deprecated = true];
}

// Next ID: 8
message SpoonFeedbackDataDonation {
  repeated string triggering_messages = 1
     ;

  repeated string intent_queries = 2
     ;

  repeated string model_outputs = 3;

  repeated MemoryEntity memory_entities = 4;

  string selected_entity_content = 5
     ;

  // The source documents that are used to generate the model outputs. The first
  // string represents the title/summary of the l0 entry, and the second string
  // represents the content of the l0 entry.
  repeated SourceDocument source_documents = 6
     ;

  // In the case of spoon failure, this field will be populated with the
  // failure reasons. Otherwise, this field will be an empty string.
  string failure_reason = 7;
}

message SpoonUserInput {
  string optional_spoon_comment = 1;
  repeated string ground_truth_list = 6
     ;
}

message SourceDocument {
  string l0_title = 1;
  string l0_content = 2;
  MemoryEntity memory_entity = 3;
}

message MemoryEntity {
  string entity_data = 1;

  string model_version = 2;
}
