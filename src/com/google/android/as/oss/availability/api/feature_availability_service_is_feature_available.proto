edition = "2024";

package com.google.android.as.oss.availability.api;

option java_outer_classname = "FeatureAvailabilityServiceIsFeatureAvailable";
option java_package = "com.google.android.as.oss.availability.api";

// Request to check if a feature is available.
message FeatureAvailabilityRequest {
  // The feature to check availability for.
  repeated Feature feature = 1;
}

message FeatureAvailabilityResponse {
  repeated FeatureAvailability feature_availability = 1;
}

message FeatureAvailability {
  Feature feature = 1;
  bool is_available = 2;
  string account_name = 3;
}

enum Feature {
  FEATURE_UNSPECIFIED = 0;
  FEATURE_GEMINI_TEXT_QUERY = 1;
  FEATURE_GEMINI_BONOBO = 2;
}
