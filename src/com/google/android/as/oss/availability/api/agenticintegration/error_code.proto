edition = "2024";

package com.google.gemini.integration.proto;

import "logs/proto/logs_annotations/logs_annotations.proto";

option java_outer_classname = "ErrorCodeOuterClass";
option (logs_proto.file_not_used_for_logging_except_enums) = true;
option java_package = "com.google.android.as.oss.availability.api.agenticintegration";

message ErrorCode {
  enum Code {
    API_STATUS_UNKNOWN = 0;
    WORK_PROFILE_NOT_SUPPORTED = 1;
    ONBOARDING_NOT_COMPLETED = 2;
    MULTIPLE_ACCOUNTS_NOT_SUPPORTED = 3;
    ACCOUNT_MISMATCH = 4;
    NO_CAPABILITIES_FOUND = 5;
    NOT_ENABLED = 6;
    ENTRY_POINT_SERVICE_ERROR = 7;
    ENTRY_POINT_REQUEST_NULL = 8;
    ENTRY_POINT_REQUEST_NOT_SUCCESS = 9;
    CAPABILITY_PROVIDER_NOT_FOUND = 10;
    AGSA_NOT_DEFAULT_ASSISTANT = 11;
    MINOR_USER = 12;
  }

  Code code = 1;
}
