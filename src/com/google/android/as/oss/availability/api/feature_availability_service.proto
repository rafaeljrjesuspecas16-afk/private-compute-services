edition = "2024";

package com.google.android.as.oss.availability.api;

import "src/com/google/android/as/oss/availability/api/feature_availability_service_is_feature_available.proto";

option java_outer_classname = "FeatureAvailabilityServiceOuterClass";
option java_package = "com.google.android.as.oss.availability.api";

// Service to check availability of a feature.
service FeatureAvailabilityService {
  // Check if a feature is available.
  rpc IsFeatureAvailable(FeatureAvailabilityRequest)
      returns (FeatureAvailabilityResponse) {
    option deadline = 5.0;
  }
}
