edition = "2024";

package com.google.android.as.oss.asr.api;

import "src/com/google/android/as/oss/asr/api/srsg_feature_config.proto";

option java_outer_classname = "SrsgProxy";
option java_package = "com.google.android.as.oss.asr.api";

// Service hosted in Pcs to proxy streaming recognition requests
// from Live Caption to the SRSG app (which hosts GoogleAsrService).
// Audio is passed via an attached ParcelFileDescriptor.
service SrsgProxyService {
  // Bi-directional streaming call to handle a recognition session.
  // The first SrsgRequest MUST contain InitialSrsgRequest, and have the
  // audio ParcelFileDescriptor attached.
  rpc RecognitionSession(stream SrsgRequest) returns (stream SrsgResponse) {
    option deadline = 36000;  // 10 hrs in seconds
  }
  // Checks model availability
  rpc CheckModelAvailability(SrsgModelAvailabilityRequest)
      returns (stream SrsgModelAvailabilityResponse);

  // Triggers model download
  rpc DownloadModel(SrsgModelDownloadRequest)
      returns (stream SrsgModelDownloadResponse);
}

message SrsgRequest {
  string session_id = 1;

  oneof payload {
    InitialSrsgRequest initial_request = 2
       ;

    EndOfData end_of_data = 3;  // Optional: To signal a clean shutdown request from client.
  }
}

message InitialSrsgRequest {
  // Config for GoogleAsrService
  string locale = 1;

  int32 sample_rate_hz = 2;

  int32 channel_count = 3;

  int32 audio_format = 4
     ;  // e.g., AudioFormat.ENCODING_PCM_16BIT

  string application_id = 5;

  bool mask_offensive_words = 6;

  LanguageDetectionConfig language_detection_config = 7
     ;

  AutoLanguageSwitchConfig auto_language_switch_config = 8
     ;

  bool asr_enhancement_enabled = 9;

  // Note: The ParcelFileDescriptor for the audio source must be sent
  // as a gRPC attachment with the message containing this InitialSrsgRequest.
}

message EndOfData {}

message SrsgResponse {
  string session_id = 1;

  oneof result {
    SerializedProtoEvent proto_event = 2
       ;

    ErrorResponse error = 3;

    SessionEnd session_end = 4;
  }
}

message SerializedProtoEvent {
  string proto_type = 1;

  bytes serialized_data = 2;
}

message ErrorResponse {
  int32 error_code = 1;
  string error_message = 2;
}

message SessionEnd {
  string reason = 1;
}

message SrsgModelAvailabilityRequest {
  // The application id of the client requesting the model availability.
  // e.g., "com.google.android.as"
  string application_id = 1;
  // The AI feature id to download (e.g., 288 for ASR continuous streaming
  // models).
  int32 ai_feature_id = 2;
}

message SrsgModelAvailabilityResponse {
  repeated SrsgModelInfo downloaded_models = 1;
  repeated SrsgModelInfo downloadable_models = 2;
  repeated SrsgModelInfo downloading_models = 3;
}

message SrsgModelInfo {
  string locale = 1;
  int64 size_bytes = 2;
  string version = 3;
  // The AI feature id to download (e.g., 288 for ASR continuous streaming
  // models).
  int32 ai_feature_id = 4;
  // Only include fields that Live Caption needs
}

message SrsgModelDownloadRequest {
  // The application id of the client requesting the model download.
  // e.g., "com.google.android.as"
  string application_id = 1;
  // BCP-47 language tag.
  string locale = 2;
  // The AI feature id to download (e.g., 288 for ASR continuous streaming
  // models).
  int32 ai_feature_id = 3;
}

message SrsgModelDownloadResponse {
  oneof event {
    SrsgDownloadProgress progress_event = 1;
    SrsgDownloadEnd end_event = 2;
  }
}

message SrsgDownloadProgress {
  // The current download progress (from 0 to 100).
  int32 download_progress = 1;
  // The downloaded size of the download in bytes.
  int64 downloaded_bytes = 2;
  // The total size of the download in bytes.
  int64 total_bytes = 3;
}

message SrsgDownloadEnd {
  enum Reason {
    UNKNOWN = 0;
    SUCCESS = 1;
    FAILURE = 2;
    MODEL_UNAVAILABLE = 3;
    SCHEDULED = 4;
    NO_INTERNET = 5;
    // Add more reasons as needed
  }
  Reason reason = 1;
}
