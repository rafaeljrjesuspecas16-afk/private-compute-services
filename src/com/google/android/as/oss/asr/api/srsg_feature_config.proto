edition = "2024";

package com.google.android.as.oss.asr.api;

option java_outer_classname = "SrsgFeatureConfigOuterClass";
option java_package = "com.google.android.as.oss.asr.api";

service SrsgFeatureConfig {}

// The policy for ASR session to enhance the quality.
message AsrEnhancementPolicy {
  enum Policy {
    // Use the default on device ASR policy without enhancement.
    DEFAULT = 0;
    FALLBACK_ALWAYS = 99;

    reserved 1, 2;
  }

  Policy policy = 1;

  reserved 2, 3, 4;
}

message AudioSourceConfig {
  // Audio sampling rate
  int32 sampling_rate = 1;

  // Audio channel count
  int32 channel_count = 2;

  reserved 3 to 6;
}

// Provides the metadata of the client app that calls through the
// GoogleRecognitionService and DataShareService gRPC services.
message ClientInfo {
  // The package name used to identify the client app.
  string package_name = 1;

  reserved 2, 3, 4, 5;
}

message FeatureConfig {
  // Limit on the maximum number of results to return.
  int32 max_results = 1;

  // Whether the recognition service should return partial results as the speech
  // goes.
  bool enable_partial_results = 2;

  // Whether to replace the offensive words with *. True by default.
  bool mask_offensive_words = 4 [default = true];

  // The configuration to enable multi segment mode, where the recognizer will
  // keep running until the specified end pointer is reached. If not set, the
  // session will end immediately when the first end of speech signal is
  // received.
  MultiSegmentConfig multi_segment_config = 5;

  // The configuration to enable formatting, including capitalization and
  // unspoken punctuation.
  FormattingConfig formatting_config = 6;

  // The configuration to enable language detection.
  LanguageDetectionConfig language_detection_config = 7;

  // The configuration to enable automatic language switch.
  // Client need to enable LanguageDetectionConfig in order for the config to
  // work. The language list will be determined by the given allowed languages;
  // if both config have non empty allowed languages, the intersection will be
  // used; if not present in both config, all existing languages
  // in ondevice models will be used.
  AutoLanguageSwitchConfig auto_language_switch_config = 8;

  // The configuration for external audio source
  AudioSourceConfig audio_source_config = 14;

  // Configuration to enhance ASR quality. The policy needs flag
  // TranscriptionDeviceConstants.enable_soda_aicore_asr flag to be enabled to
  // take effect.
  AsrEnhancementPolicy asr_enhancement_policy = 17;

  // Client specific request extensions
  extensions 100 to 199 [verification = UNVERIFIED];

  reserved 3, 12, 13, 16, 19;
}

// The configuration for a multi-segment session.
message MultiSegmentConfig {
  // Specifies the endpoint of the session.
  oneof endpoint_type {
    // Ends the recognition session when the input audio source reaches the end.
    bool audio_source_end = 1;

    // Ends the recognition session at the first end-of-speech signal past the
    // amount of time specified.
    int32 min_speech_length_ms = 2;

    // Ends the recognition session when a silence of the specified length is
    // detected.
    int32 max_silence_length_ms = 3;
  }

  // If max_silence_length_ms not been set, this value will not take effect.
  // End the recognition session only if the specified length of silence is
  // passed after open the microphone or audio streaming. This only taking
  // effect at the beginning before first detected speech. If not been set
  // max_silence_length_ms will be used if present.
  // Available in SRSG version code >= 210580423,
  // googletts.google-speech-apk_20250728.02_p1 build.
  int32 initial_silence_length_ms = 4;
}

// The configuration to enable text formatting.
message FormattingConfig {
  // Whether to enable text formatting.
  bool enabled = 1;

  // How text formatting should be optimized.
  enum Optimization {
    // Optimizes quality.
    DEFAULT_OPTIMIZE_QUALITY = 0;

    // Optimizes latency.
    OPTIMIZE_LATENCY = 1;
  }

  Optimization optimization = 2 [default = DEFAULT_OPTIMIZE_QUALITY];

  // Whether to add punctuation fo the end of partials.
  bool hide_partial_trailing_punctuation = 3 [default = false];
}

// The configuration to enable language detection.
message LanguageDetectionConfig {
  // Whether to enable language detection.
  bool enabled = 1;

  // If set, the language detection result will be constrained by this list of
  // languages. This can be used to improve the detection accuracy.
  repeated string allowed_languages = 2;
}

// The configuration to enable automatic language switch.
message AutoLanguageSwitchConfig {
  // Whether to enable automatic language switch.
  bool enabled = 1;

  // How language switch should be optimized.
  enum Optimization {
    // Optimizes quality, corresponding to Soda's high precision.
    DEFAULT_OPTIMIZE_QUALITY = 0;

    // Balances between quality and latency.
    OPTIMIZE_BALANCED = 1;

    // Optimizes latency, corresponding to Soda's low reaction time.
    OPTIMIZE_LATENCY = 2;
  }

  Optimization optimization = 2 [default = DEFAULT_OPTIMIZE_QUALITY];

  // If set, we will only attempt auto switch if the detected language is in
  // this allowlist.
  repeated string allowed_languages = 3;

  // Constraints applied to the auto switch.
  SwitchConstraints switch_constraints = 4;

  // Enables context biasing when Soda is running in multilang mode.
  bool enable_context_biasing_for_multilang = 5;
}

// Constraints applied to automatic language switch.
message SwitchConstraints {
  // The maximum number of language switches allowed per session or speech
  // segment as constrained by SwitchConstraintType. Only valid if larger than
  // 0.
  int32 max_number_of_switches = 1;

  // The amount of time since start of session or start of speech segment (as
  // constrained by SwitchConstraintType) after which language switches are no
  // longer allowed.
  int32 no_switch_after_ms = 2;

  enum SwitchConstraintType {
    // Use the SODA session.
    DEFAULT_CONSTRAINT_SODA_SESSION = 0;

    // Either use the speech segment (from the endpointer in the ASR pipeline),
    // or use the ASR final event as a proxy.
    CONSTRAINT_SPEECH_SEGMENT = 1;
  }

  // How do we constrain the multilang behavior.
  // This applies to both `max_number_of_switches` and `no_switch_after_ms`.
  SwitchConstraintType switch_constraint_type = 7
      [default = DEFAULT_CONSTRAINT_SODA_SESSION];
}
