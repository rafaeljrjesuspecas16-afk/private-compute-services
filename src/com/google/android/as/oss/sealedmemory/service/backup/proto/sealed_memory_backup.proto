edition = "2024";

package com.google.android.as.oss.sealedmemory.service.backup;

option features.field_presence = IMPLICIT;
option java_package = "com.google.android.as.oss.sealedmemory.service.backup";
option java_outer_classname = "SealedMemoryBackup";

message SealedMemoryBackupPayload {
  message KeyEntry {
    string key_name = 1;
    bytes key_data = 2;
  }

  message AssociationEntry {
    string association_id = 1;
    string key_name = 2;
  }

  repeated KeyEntry keys = 1;
  repeated AssociationEntry associations = 2;
}
