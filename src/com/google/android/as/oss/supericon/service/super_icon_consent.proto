edition = "2024";

package com.google.android.as.oss.supericon.service;

option java_package = "com.google.android.as.oss.supericon.service";

// Represents a historical record of consent state
message ConsentHistoryEntry {
  // Timestamp in milliseconds
  int64 timestamp_ms = 1;
  ConsentStateProto state = 2;
  int64 version = 3;
}

// Represents the user's consent state for the WTv2+ super icon feature
enum ConsentStateProto {
  CONSENT_STATE_UNSET = 0;
  CONSENT_STATE_GRANTED = 1;
  CONSENT_STATE_DENIED = 2;
  CONSENT_STATE_REVOKED = 3;
}

// Stored data for the Super Icon feature
message SuperIconConsentData {
  ConsentStateProto current_state = 1;
  repeated ConsentHistoryEntry history = 2;
  int32 consent_form_shown_count = 3;
}
